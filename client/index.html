<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 会话 · Chat Agent</title>
    <script>
      (function () {
        try {
          var key = "chat-agent-theme-mode";
          var stored = window.localStorage.getItem(key);
          var theme = stored === "light" ? "light" : "dark";
          document.documentElement.dataset.theme = theme;
        } catch (_err) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
